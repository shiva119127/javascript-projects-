<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 25px 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        .error {
            color: red;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .result {
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
            color: green;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #4facfe;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Mark Predictor</h2>

        <form id="form">

            <label>Email</label>
            <input type="email" id="email" placeholder="ABC@gmail.com" required>
            <p id="emailMsg" class="error"></p>

            <label>Marks in 10th</label>
            <input type="number" id="m10" placeholder="Enter value" required>

            <label>Marks in 11th</label>
            <input type="number" id="m11" placeholder="Enter value" required>

            <label>Pre-board Marks</label>
            <input type="number" id="pre" placeholder="Enter value" required>

            <p id="result" class="result"></p>

            <button type="submit">Predict</button>

        </form>
    </div>

    <script src="script.js"></script>

</body>
</html>
